summary:
  primary_problem_solved: schema-first metadata catalog and context graph connecting technical metadata, lineage, ownership, quality, governance, glossaries, policies, data contracts, APIs, SDKs, search, and MCP access
  core_architectural_principles:
  - schema-first entity model
  - lineage as typed graph edges with details
  - governance semantics attached to assets through owners, domains, classifications, glossaries, policies, and contracts
  - activation through APIs, events, search, SDKs, and MCP
  main_assumptions:
  - metadata is valuable when normalized across asset types
  - lineage and governance need explicit entity references and operations
  - AI/tool access should inherit governed user context
