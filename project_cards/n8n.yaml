  primary_problem_solved: visual/code-capable workflow automation platform for integrating services through typed nodes, triggers, webhooks, credentials, and persisted executions
  core_architectural_principles:
  - node-and-connection workflow graph
  - connector/node interface as integration boundary
  - trigger/webhook activation separate from workflow definition
  - execution data persisted separately from workflow definitions
