schema_version: 1
kind: metaharvest_change_discovery_index
status: active
last_updated: '2026-06-18'
doctrine:
  metaharvest_owns: discoverability_of_change
  consuming_projects_own: evaluation_of_change
  boundary_summary: >-
    MetaHarvest publishes project-neutral records of new, modified, retired,
    superseded, and stale artifacts. Consumers decide locally whether any change
    matters.
consumer_contract:
  question_answered: What changed in MetaHarvest since I last looked?
  does_not_answer: Does this matter to my project, and what should I do?
  consumer_responsibility: >-
    Evaluate relevance, adoption, rejection, implementation, and local priority
    inside the consuming project.
  producer_responsibility: >-
    Publish deterministic, auditable, project-neutral change records without
    deciding consumer relevance.
forbidden_outputs:
  - affected project lists
  - project-specific advice
  - adoption suggestions
  - automatic review generation
  - automatic task creation
  - automatic project modification
  - consumer priority ranking
change_types:
  - new_artifact
  - modified_artifact
  - retired_artifact
  - superseded_artifact
  - staleness_update
artifact_statuses:
  - active
  - stale
  - superseded
  - retired
