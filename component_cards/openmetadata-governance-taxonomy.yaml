  - governance metadata
  - business semantics
  - policy-aware context
  related_problems:
  - taxonomy coverage
  - reusable non-domain infrastructure vocabulary
  anti_problems:
  - platform adoption by default
  - collection growth without validation value
  failure_modes_addressed:
  - semantic drift
  - unclear ownership
  - policy context absent from data use
  failure_modes_introduced:
  - taxonomy sprawl
  - over-classification
  architectural_principle: Track only governance fields that answer real retrieval/audit questions; avoid building a full catalog taxonomy prematurely.
  required_assumptions:
