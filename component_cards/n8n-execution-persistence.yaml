architecture:
  problem_solved: Execution records store workflow snapshots, status, data, and configured storage location so executions can be audited and retrieved independently from current workflow definitions.
  problems_solved:
  - execution history
  - workflow snapshots
  - storage mode boundary
  related_problems:
  - taxonomy coverage
  - reusable non-domain infrastructure vocabulary
  anti_problems:
  - platform adoption by default
  - collection growth without validation value
  failure_modes_addressed:
  - lost audit trail
  - execution data too large for normal context
  - current definition overwriting run evidence
  failure_modes_introduced:
  - storage backend complexity
  - privacy/redaction requirements
  architectural_principle: Persist run evidence with workflow snapshot and storage-location metadata; keep execution blobs out of normal retrieval context.
  required_assumptions:
  - compact artifacts are preferred over runtime adoption
  - source evidence remains descriptive and non-binding
  useful_patterns:
  - execution snapshot plus compact pointer pattern
