architecture:
  problem_solved: Lineage is represented as upstream/downstream entity edges with lineage details, source type, SQL query, pipeline reference, column lineage, and authorization on lineage edits.
  problems_solved:
  - lineage graph
  - column lineage
  - authorized lineage mutation
  related_problems:
  - taxonomy coverage
  - reusable non-domain infrastructure vocabulary
  anti_problems:
  - platform adoption by default
  - collection growth without validation value
  failure_modes_addressed:
  - unreviewed lineage edits
  - impact analysis gaps
  - loss of transformation context
  failure_modes_introduced:
  - graph/index complexity
  - authorization overhead
  architectural_principle: Preserve lineage edge details and mutation authorization as concepts; implement locally as reviewable files if needed.
  required_assumptions:
  - compact artifacts are preferred over runtime adoption
  - source evidence remains descriptive and non-binding
  useful_patterns:
  - lineage edge + details interface
